version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: shapefit_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shapefit
    ports:
      - "5445:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    container_name: shapefit_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/shapefit
      SECRET_KEY: your-secret-jwt-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/venv
      - coach_qr:/app/coach_qr
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        echo 'Initializing database...' &&
        python init_db.py &&
        echo 'Creating coach account...' &&
        python create_coach.py &&
        echo 'Generating QR code...' &&
        python generate_qr.py &&
        echo 'Starting server...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # Optional: Database UI (Adminer)
  adminer:
    image: adminer:latest
    container_name: shapefit_adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
  coach_qr:
