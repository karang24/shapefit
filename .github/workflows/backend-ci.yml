name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    # IMPORTANT:
    # Rename this if your GitHub Environment is not "production".
    environment: production

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${{ vars.ACCESS_TOKEN_EXPIRE_MINUTES }}
      ALGORITHM: ${{ vars.ALGORITHM }}
      DAILY_IMAGE_ANALYSIS_LIMIT: ${{ vars.DAILY_IMAGE_ANALYSIS_LIMIT }}
      OPENAI_VISION_MODEL: ${{ vars.OPENAI_VISION_MODEL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required env
        shell: bash
        run: |
          missing=0
          for key in DATABASE_URL OPENAI_API_KEY SECRET_KEY ALGORITHM ACCESS_TOKEN_EXPIRE_MINUTES DAILY_IMAGE_ANALYSIS_LIMIT OPENAI_VISION_MODEL; do
            if [ -z "${!key}" ]; then
              echo "::error title=Missing env::${key} is empty (check Environment secrets/vars)"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create backend .env
        shell: bash
        run: |
          cat > backend/.env << EOF
          DATABASE_URL=${DATABASE_URL}
          SECRET_KEY=${SECRET_KEY}
          ALGORITHM=${ALGORITHM}
          ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          OPENAI_VISION_MODEL=${OPENAI_VISION_MODEL}
          DAILY_IMAGE_ANALYSIS_LIMIT=${DAILY_IMAGE_ANALYSIS_LIMIT}
          EOF

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Backend compile check
        working-directory: backend
        run: |
          python -m compileall -q app

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Mobile typecheck
        working-directory: mobile
        run: npx tsc --noEmit

